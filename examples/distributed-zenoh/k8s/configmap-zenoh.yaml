apiVersion: v1
kind: ConfigMap
metadata:
  name: zenoh-bridge-config
  namespace: lokesh-ros2-distributed-demo
  labels:
    app.kubernetes.io/part-of: ros2-distributed
data:
  gazebo-bridge.json5: |
    {
      plugins: {
        ros2dds: {}
      },
      mode: "router",
      listen: {
        endpoints: [
          "tcp/0.0.0.0:7447"
        ]
      },
      scouting: {
        multicast: {
          enabled: false
        }
      }
    }
  nav2-bridge.json5: |
    {
      plugins: {
        ros2dds: {}
      },
      mode: "peer",
      connect: {
        endpoints: [
          "tcp/gazebo-sim-zenoh:7447"
        ],
        retry: {
          period_init_ms: 1000,
          period_max_ms: 16000,
          period_increase_factor: 2
        },
        exit_on_failure: false
      },
      scouting: {
        multicast: {
          enabled: false
        }
      }
    }
